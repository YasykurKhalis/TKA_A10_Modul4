input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
    target => "parsed"
    skip_on_invalid_json => true
    tag_on_failure => ["malformed_json"]
  }

  if "malformed_json" not in [tags] {
    mutate {
      add_field => {
        "level"       => "%{[parsed][level]}"
        "service"     => "%{[parsed][service]}"
        "player_id"   => "%{[parsed][player_id]}"
        "player_name" => "%{[parsed][player_name]}"
        "event_type"  => "%{[parsed][event_type]}"
        "linked_gate" => "%{[parsed][linked_gate]}"
        "status"      => "%{[parsed][status]}"
        "message_log" => "%{[parsed][message]}"
      }
    }

    if ![parsed][level] or ![parsed][service] or ![parsed][player_id] or
       ![parsed][player_name] or ![parsed][event_type] or ![parsed][linked_gate] or
       ![parsed][status] or ![parsed][message] {
      mutate {
        add_tag => ["missing_required_fields"]
      }
    }

    if [parsed][event_type] == "Invalid Gate Request" {
      mutate {
        add_tag => ["suspicious_activity"]
      }
    }

    if [parsed][event_type] == "Challenge Failed" {
      mutate {
        add_tag => ["challenge_failed"]
      }
    }
  }
}

output {
  if "malformed_json" in [tags] or "missing_required_fields" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "linked-verse-errors-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "linked-verse-logs-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => rubydebug }
}